    command: bash -c "while !</dev/tcp/db/5432; do sleep 10; done; python logic.py"
    networks:
      - traefik_network

  # ----------------------- END MAIN BACKEND ----------------------- #


  # DATABASE
  db:
    image: postgres:17.0-alpine3.20
    env_file:
      - ./.env
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: atlas-cosmos
    restart: always
    volumes:
      - "postgres_data:/var/lib/postgresql/data/"
    labels:
      - "traefik.enable=true"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d atlas-cosmos"]
      interval: 10s
      retries: 5
      start_period: 30s
      timeout: 10s
    networks:
      - traefik_network
    command:
      - "-c"
      - "max_connections=50"

volumes:
  postgres_data:
  # letsencrypt:

networks:
  traefik_network:
    external: true
