services:

  # ----------------------- START AKASH ----------------------- #
  akash-backend:
    container_name: akash-backend
    build:
      context: ./backend
      dockerfile: akash/Dockerfile
    env_file:
      - ./.env
    environment:
      - PORT=8080
    restart: unless-stopped

    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.akash-backend.rule=Host(`pbeakash.atlas-staking.com`)"
      - "traefik.http.routers.akash-backend.entrypoints=websecure"
      - "traefik.http.routers.akash-backend.tls.certresolver=letsencrypt"
      - "traefik.http.middlewares.cors.headers.accesscontrolallowmethods=*"

    networks:
      - traefik_network

  akash-logic:
    container_name: akash-logic
    build:
      context: ./backend
      dockerfile: akash/Dockerfile
    environment:
      - DATABASE_URL=postgresql://postgres:${POSTGRES_PASSWORD}@atlas-multichain-db-1/atlas-cosmos
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

    labels:
      - "traefik.enable=true"

    command: bash -c "while !</dev/tcp/db/5432; do sleep 10; done; python logic.py"
    networks:
      - traefik_network

